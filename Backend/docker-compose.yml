version: '3.8'
services:
  backend:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://db:27017/researchconnect
      - NODE_ENV=development
      - JWT_SECRET=developmentsignaturesecretfortokenssigningprocesses
      - JWT_REFRESH_SECRET=developmentrefreshsignaturesecretfortokenssigningprocesses
    depends_on:
      - db
  db:
    image: mongo:6.0
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
